name: Update profile art

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - contrib-heatmap.svg
      - gaurav-ascii.svg
      - info-card.svg
      - data/contributions.json

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Fetch GitHub Contributions
        env:
          GH_PROFILE_USER: kaabilgaurav
        run: |
          python scripts/fetch_contributions.py

      - name: Generate Contribution Heatmap
        run: |
          python scripts/render_heatmap_svg.py

      - name: Prepare Portrait
        run: |
          python scripts/prep_photo.py

      - name: Generate ASCII Portrait
        run: |
          python scripts/make_ascii_svg.py

      - name: Generate Info Card
        run: |
          python scripts/make_info_card.py

      - name: Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add contrib-heatmap.svg gaurav-ascii.svg info-card.svg data/contributions.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update profile assets"

          for attempt in 1 2 3; do
            if git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi

            git rebase --abort || true
            if [ "${attempt}" -eq 3 ]; then
              echo "Unable to publish generated assets after ${attempt} attempts." >&2
              exit 1
            fi

            sleep $((attempt * 2))
          done
