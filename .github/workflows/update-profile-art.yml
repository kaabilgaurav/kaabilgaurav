name: Update profile art

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Fetch GitHub Contributions
        env:
          GH_PROFILE_USER: kaabilgaurav
        run: |
          python scripts/fetch_contributions.py

      - name: Generate Contribution Heatmap
        run: |
          python scripts/render_heatmap_svg.py

      - name: Prepare Portrait
        run: |
          python scripts/prep_photo.py

      - name: Generate ASCII Portrait
        run: |
          python scripts/make_ascii_svg.py

      - name: Generate Info Card
        run: |
          python scripts/make_info_card.py

           - name: Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add contrib-heatmap.svg avi-ascii.svg info-card.svg data/contributions.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update profile assets"

          git pull --rebase origin main

          git push